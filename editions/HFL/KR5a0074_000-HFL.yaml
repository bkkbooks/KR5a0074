body:
  text: 太上說九幽拔罪心印妙經爾時元始天尊坐七寳殿放大光明徧照三千大千世界觀見衆生受諸苦惱沉淪生死受報无窮於是救苦真人即從座起瞻仰尊顔長跪問曰是諸衆生以何因縁飄蕩苦海沉沒无邊天尊告曰如是衆生受諸惡業皆由自心妄想顛倒不悟无爲一切罪根皆從心起天堂快樂自由心生三界沉淪亦從心起心生邪見妄起貪嗔心生惑亂存念非真心懐殺害受諸類身心生諂曲與道无因心生虚寂與道相親重宣此義而說偈曰大道澄廓元理幽深先天而生運化古今道无形體澄濾身心不貪不慾不嗔不滛是非莫識表裹思尋身心清淨煩惱不侵无起无滅㝠漠難斟湛然空寂了心无心自然合道衆聖來欽昇朝金闕遊翫騫林七祖解脫永離幽隂皆契心印悟道合真念念相繼勿起塵心是時受苦衆生聞說妙經咸皆解脫衆真作禮悉大歡喜稱揚讃歎依教奉行太上說九幽拔罪心印妙經終
